
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal | Login</title>
    <style>
        /* Modern Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Deep theme blue */
            background: #1a2238; 
            overflow: hidden;
            position: relative;
        }

        /* --- THE CIRCLE ANIMATIONS --- */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(44, 74, 154, 0.4), rgba(26, 34, 56, 0.1));
            filter: blur(60px);
            z-index: 1;
            animation: move 20s infinite alternate ease-in-out;
        }

        .circle-1 { width: 500px; height: 500px; top: -150px; left: -150px; animation-duration: 15s; }
        .circle-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; animation-duration: 20s; background: rgba(44, 74, 154, 0.2); }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.1); }
        }

        /* --- THE LOGIN CARD --- */
        .login-card {
            background: rgba(255, 255, 255, 1);
            width: 90%;
            max-width: 400px;
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10; /* Keeps card above circles */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header h2 { 
            color: #1a2238; 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 8px; 
        }

        .login-header p { color: #718096; font-size: 14px; margin-bottom: 35px; }

        /* Form Inputs */
        .input-group { text-align: left; margin-bottom: 20px; }
        
        .input-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            color: #4a5568; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #2c4a9a;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(44, 74, 154, 0.1);
        }

        /* Fantastic Interactive Button */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #2c4a9a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(44, 74, 154, 0.3);
        }

        .login-btn:hover {
            background: #1a2238;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(26, 34, 56, 0.4);
        }

        .login-footer { margin-top: 35px; border-top: 1px solid #f1f1f1; padding-top: 20px; }
        .login-footer p { font-size: 12px; color: #a0aec0; }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="login-card">
        <div class="login-header">
            <h2>Attendance Portal</h2>
            <p>Enter credentials to access dashboard</p>
        </div>

        <form action="LoginServlet" method="post" id="loginForm">
            <div class="input-group">
                <label>User Role</label>
                <select name="role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="admin">Administrator</option>
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
        </form>

        <div class="login-footer">
            <p>&copy; 2026 Attendance Management System. All Rights Reserved.</p>
        </div>
    </div>

    <script>
        // Simple interactive feedback on button click
        document.getElementById('loginForm').onsubmit = function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "Authenticating...";
            btn.style.opacity = "0.8";
            btn.style.cursor = "wait";
        };
    </script>

</body>
</html>
